services:
  - type: web
    name: receiptos-base
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_SITE_URL
        value: https://receiptos-base.onrender.com
      - key: NEXT_PUBLIC_URL
        value: https://receiptos-base.onrender.com
      - key: BASE_RPC_URL
        sync: false
