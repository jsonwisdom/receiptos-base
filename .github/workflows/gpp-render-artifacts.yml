name: GPP Render Artifacts

on:
  workflow_dispatch:
    inputs:
      wave:
        description: "Wave id"
        required: true
        default: "W031"

permissions:
  contents: read

jobs:
  artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: gpp-renderer-package
          path: gpp-renderer/
