name: Verify Anchor

on:
  push:
  pull_request:

jobs:
  verify-local-anchor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Verify all local anchors
        run: bash scripts/verify-all-anchors.sh evidence/anchors.json

  verify-spec-v1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run SPEC-V1 conformance bailiff
        run: node ci/local-runner.js --spec SPEC-V1
      - name: Upload SPEC-V1 summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spec-v1-summary
          path: results/SPEC-V1/summary.json

  verify-onchain-anchor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all on-chain anchors if BASE_RPC_URL is set
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          REQUIRE_ONCHAIN: "1"
        run: |
          if [ -z "${BASE_RPC_URL:-}" ]; then
            echo "BASE_RPC_URL not set; skipping RPC-backed EAS verification."
            exit 0
          fi

          bash scripts/verify-all-anchors.sh evidence/anchors.json
