name: ReceiptOS CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Install local CLI shim
        run: |
          chmod +x receiptos-cli
          sudo ln -sf "$PWD/receiptos-cli" /usr/local/bin/receiptos

      - name: Run tests
        run: pytest -q tests/test_receipt_integrity.py
