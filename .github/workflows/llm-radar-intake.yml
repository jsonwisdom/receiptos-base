name: LLM Radar Intake

on:
  workflow_dispatch:
  schedule:
    - cron: "23 15 * * 1-5"

permissions:
  contents: read

jobs:
  intake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run LLM Radar intake
        run: python scripts/llm_radar_intake.py --print
      - name: Upload radar receipt ledger
        uses: actions/upload-artifact@v4
        with:
          name: llm-radar-intake-receipts
          path: receipts/model_alerts.jsonl
