name: Pre-Publish Audit

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run verify:receiptos:anchor
      - run: npm audit --audit-level=high
      - run: npm pack --dry-run
