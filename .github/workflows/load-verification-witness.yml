name: LOAD_VERIFICATION_WITNESS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      transform_version:
        description: Transform version
        required: true
        default: v0.1.0
      target_qps:
        description: Target QPS
        required: true
        default: '200'
      duration_min:
        description: Duration minutes
        required: true
        default: '15'

jobs:
  witness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run fail-closed witness harness
        run: |
          python tools/load_harness.py \
            --transform-version "${{ github.event.inputs.transform_version || 'v0.1.0' }}" \
            --target-qps "${{ github.event.inputs.target_qps || '200' }}" \
            --duration-min "${{ github.event.inputs.duration_min || '15' }}" \
            --allow-governance-gap-exit-zero
      - name: Upload witness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: load-verification-witness
          path: |
            receipts/*.json
            receipts/*.json.sig
            transparency/log/*.json
            transparency/index/chain_head.json
