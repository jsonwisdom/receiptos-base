name: ReplayBoard Settle Probe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify settle runner loads
        run: python -m py_compile ReplayBoard/settle.py
      - name: Show settle help
        run: python ReplayBoard/settle.py --help
