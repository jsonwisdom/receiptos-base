name: Farcaster Manifest Verification

on:
  push:
    paths:
      - ".well-known/farcaster/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/farcaster-manifest.yml"
  pull_request:
    paths:
      - ".well-known/farcaster/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/farcaster-manifest.yml"
  workflow_dispatch:

jobs:
  verify-farcaster-manifest:
    name: Verify Farcaster Manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Check manifest exists
        run: test -f .well-known/farcaster/manifest.json

      - name: RFC8785 Test Vectors
        run: npm run test:rfc8785

      - name: Semantic Verification
        run: npm run verify:farcaster:semantic

      - name: Verify Manifest Lock
        run: npm run verify:farcaster:lock

      - name: Emit CI Receipt
        if: always()
        run: |
          mkdir -p .receipts
          echo '{"receipt_type":"FARCASTER_MANIFEST_CI_RECEIPT_V1","git_commit":"'"${GITHUB_SHA}"'","workflow":"'"${GITHUB_WORKFLOW}"'","run_id":"'"${GITHUB_RUN_ID}"'","manifest_path":".well-known/farcaster/manifest.json","canonical_manifest_path":".well-known/farcaster/manifest.jcs","lock_path":".well-known/farcaster/manifest.lock.json","rfc8785_test_vectors":"scripts/rfc8785-test-vectors.js","semantic_verifier":"scripts/semantic-verify.js","lock_verifier":"scripts/verify-manifest-lock.js","authority":false}' > ".receipts/farcaster-manifest-${GITHUB_SHA}.json"
          cat ".receipts/farcaster-manifest-${GITHUB_SHA}.json"
