name: Public Audit Surface Guard

on:
  push:
    paths:
      - 'frame/ext-103-public-audit-surface.js'
      - 'scripts/verify-public-audit-surface.js'
      - 'docs/public-audit-surface.md'
      - '.github/workflows/public-audit-surface.yml'
  pull_request:
    paths:
      - 'frame/ext-103-public-audit-surface.js'
      - 'scripts/verify-public-audit-surface.js'
      - 'docs/public-audit-surface.md'
      - '.github/workflows/public-audit-surface.yml'

permissions:
  contents: read

jobs:
  public-audit-surface:
    name: EXT-103 public audit surface verifier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify public audit surface boundary
        run: node scripts/verify-public-audit-surface.js
