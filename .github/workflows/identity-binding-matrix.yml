name: Identity Binding Matrix

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install --no-audit --no-fund
      - run: node scripts/test-identity-binding-matrix.mjs
