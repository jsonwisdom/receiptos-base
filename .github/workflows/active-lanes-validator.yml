name: ACTIVE_LANES validator

on:
  push:
    paths:
      - "ACTIVE_LANES.md"
      - "ztvs/active_lanes_validator.py"
  pull_request:
    paths:
      - "ACTIVE_LANES.md"
      - "ztvs/active_lanes_validator.py"

jobs:
  validate-active-lanes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run ACTIVE_LANES validator
        run: |
          python ztvs/active_lanes_validator.py
