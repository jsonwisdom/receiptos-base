name: JayOps Daily Briefing

on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:
    inputs:
      replay_hash:
        description: "Optional replay hash for this briefing witness"
        required: false
        type: string

permissions:
  contents: read
  actions: read

jobs:
  render-daily-briefing:
    name: Render witness-only daily briefing
    runs-on: ubuntu-latest
    env:
      DAILY_BRIEFING_REPLAY_HASH: ${{ inputs.replay_hash }}
      DAILY_BRIEFING_TO: jaywisdom44@gmail.com
      DAILY_BRIEFING_FROM: jaywisdom44@gmail.com
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      DAILY_BRIEFING_GITHUB_WORKFLOWS: "[]"
      DAILY_BRIEFING_DEPLOYMENTS: "[]"
      DAILY_BRIEFING_CALENDAR: "[]"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Render briefing
        run: npx --yes tsx scripts/send-daily-briefing.ts
