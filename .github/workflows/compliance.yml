name: ReceiptOS Compliance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo build
        run: cargo build --verbose --all-targets

      - name: Cargo test
        run: cargo test --verbose

      # Minimal fixture smoke test stub (Step 2)
      - name: Fixture smoke test
        run: |
          echo "Fixture smoke test stub - implementation pending"
          if [ -f "tests/fixtures/basic.json" ]; then
            echo "Fixture path verified"
          else
            echo "No fixtures yet - stub passed"
          fi
          exit 0