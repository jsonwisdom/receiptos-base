name: Production Lock Gate

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python verify_production_lock.py
      - run: python verify_ext-038.py
      - run: python deployment/freeze-guard-stack-hash.py
