name: PageAgent WireEvent Fixture

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "adapters/page-agent/**"
      - "scripts/emit-page-agent-fixture.mjs"
      - "package.json"
      - ".github/workflows/page-agent-fixture.yml"
  workflow_dispatch:

jobs:
  emit-page-agent-fixture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run PageAgent schema tests
        run: npm run test:page-agent

      - name: Emit canonical WireEvent fixture
        run: npm run emit:page-agent:fixture

      - name: Upload PageAgent WireEvent fixture
        uses: actions/upload-artifact@v4
        with:
          name: page-agent-wireevent-fixture
          path: |
            artifacts/page-agent/wireevent.fixture.json
            artifacts/page-agent/wireevent.fixture.sha256
          if-no-files-found: error
