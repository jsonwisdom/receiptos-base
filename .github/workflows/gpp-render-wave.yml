name: GPP Render Wave

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gpp-renderer
    steps:
      - name: Checkout render branch
        uses: actions/checkout@v4
        with:
          ref: render/w031-reputation-rascals

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Render W031 mock cards
        run: python scripts/render_mock.py --prompt ../gpp-renderer/prompts/w031_reputation_rascals.json --out output/W031

      - name: Build checksum sidecars
        run: python scripts/checksum_manifest.py --wave W031 --output-dir output/W031 --manifest sidecars/W031_sidecar_manifest.json --prompt ../gpp-renderer/prompts/w031_reputation_rascals.json

      - name: Prepare Google Drive credentials
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          secret = os.environ.get("GDRIVE_SERVICE_ACCOUNT_JSON", "").strip()
          if not secret:
              raise SystemExit("GDRIVE_SERVICE_ACCOUNT_JSON is empty or missing")

          if secret.startswith("{"):
              credentials = secret
          else:
              credentials = base64.b64decode(secret).decode("utf-8")

          json.loads(credentials)
          Path("credentials.json").write_text(credentials, encoding="utf-8")
          print("credentials.json written and validated")
          PY

      - name: Upload to Google Drive
        env:
          GDRIVE_CREDENTIALS_PATH: credentials.json
        run: python scripts/upload_gdrive.py --wave W031 --folder-name W031_Reputation_Rascals --local-dir output/W031 --sidecars sidecars --root-folder-id 1dowKY26gjqs267L-N_zGJ3eySyysZoqt

      - name: Commit outputs to render branch
        run: |
          git config user.name "gpp-render-bot"
          git config user.email "actions@github.com"
          git add gpp-renderer/output gpp-renderer/sidecars || true
          git commit -m "Render W031 mock assets" || echo "No changes to commit"
          git push origin HEAD:render/w031-reputation-rascals
