name: GPP Render Wave

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gpp-renderer
    steps:
      - name: Checkout render branch
        uses: actions/checkout@v4
        with:
          ref: render/w031-reputation-rascals

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Render W031 mock cards
        run: python scripts/render_mock.py --prompt ../gpp-renderer/prompts/w031_reputation_rascals.json --out output/W031

      - name: Build checksum sidecars
        run: python scripts/checksum_manifest.py --wave W031 --output-dir output/W031 --manifest sidecars/W031_sidecar_manifest.json --prompt ../gpp-renderer/prompts/w031_reputation_rascals.json

      - name: Upload W031 artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: W031-renders
          path: |
            gpp-renderer/output/W031
            gpp-renderer/sidecars

      - name: Supadrive upload placeholder
        run: |
          echo "Supadrive lane selected. Google Drive lane removed."
          echo "Current authoritative package: GitHub artifact W031-renders plus committed sidecars."

      - name: Commit outputs to render branch
        run: |
          git config user.name "gpp-render-bot"
          git config user.email "actions@github.com"
          git add output sidecars || true
          git commit -m "Render W031 mock assets" || echo "No changes to commit"
          git push origin HEAD:render/w031-reputation-rascals
